name: Keep Alive Infrastructure

on:
  schedule:
    # Berjalan setiap 2 hari sekali jam 00:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: # Agar bisa dijalankan manual untuk tes

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping SmartConvert API
        run: |
          curl -I https://bestoism-smartconvertapi.hf.space/api/v1/health-check